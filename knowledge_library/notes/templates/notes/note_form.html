{% extends 'notes/base.html' %}

{% block content %}
    <h1>Create / Edit note</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Save</button>
        <a class="btn btn-delete" href="{% url 'note_list' %}">Cancel</a>
    </form>
{% endblock %}
