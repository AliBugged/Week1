<h1>Notes</h1>
<a href="/create/">Create new note</a>
<a href="/delete/{{ note.id }}/">Delete</a>

{% for note in notes %}
    <h2>{{ note.title }}</h2>
    <p>{{ note.content }}</p>
    <p>Category: {{ note.category }}</p>
    <a href="/update/{{ note.id }}/">Edit</a>
    <a href="/delete/{{ note.id }}/">Delete</a>

{% endfor %}
