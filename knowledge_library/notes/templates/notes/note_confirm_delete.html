{% extends 'notes/base.html' %}

{% block content %}
    <h1>Delete note</h1>

    <p>Are you sure you want to delete <strong>"{{ note.title }}"</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a class="btn btn-create" href="{% url 'note_list' %}">Cancel</a>
    </form>
{% endblock %}
